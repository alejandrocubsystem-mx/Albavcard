<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alba Núñez | Real Estate Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* Colores extraídos del logo hexagonal */
            --hex-blue: #005fba; 
            --light-blue: #4baee8;
            --neutral-bg: #f4f7f9;
            --white: #ffffff;
            --text-dark: #1a2a3a;
        }

        body {
            background-color: var(--neutral-bg);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--white);
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 95, 186, 0.15);
            border: 1px solid rgba(0, 95, 186, 0.1);
        }

        .logo-box { width: 120px; margin: 0 auto 25px; }
        .logo-box img { width: 100%; height: auto; }

        h1 { font-family: 'Playfair Display', serif; color: var(--text-dark); margin: 0; font-size: 1.7rem; }
        .role { color: var(--hex-blue); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2.5px; margin: 8px 0 30px; font-weight: 700; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        
        .action-btn {
            padding: 14px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main { background: var(--hex-blue); color: white; }
        .btn-main:hover { background: var(--light-blue); }
        
        .btn-secondary { background: #eef5fb; color: var(--hex-blue); }
        .btn-secondary:hover { background: #dfeaf4; }

        .footer-tag { margin-top: 30px; color: #888; font-size: 0.65rem; letter-spacing: 1.5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo-box">
            <img src="logo2.png" alt="Logo">
        </div>
        
        <h1>Alba Núñez</h1>
        <div class="role">Inversionista en Bienes Raíces</div>

        <div class="btn-group">
            <a href="tel:+16614931733" class="action-btn btn-main">
                <i class="fa-solid fa-phone"></i> Llamar ahora
            </a>
            <a href="https://wa.me/16614931733" class="action-btn btn-secondary">
                <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
            <button onclick="downloadVCard()" class="action-btn btn-secondary">
                <i class="fa-solid fa-user-plus"></i> Guardar Contacto
            </button>
        </div>

        <div class="footer-tag">Estrategias de Inversión Inmobiliaria</div>
    </div>

    <script>
        function downloadVCard() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Alba Nunez\nORG:Inversiones Inmobiliarias\nTITLE:Real Estate Investor\nTEL;TYPE=CELL:+16614931733\nEND:VCARD";
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Alba_Nunez.vcf';
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
