<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alba Núñez | Real Estate Professional</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            /* Colores extraídos del logo */
            --blue-light: #4baee8;
            --blue-medium: #0077d4;
            --blue-dark: #003d7a;
            --gold-door: #d4af37;
            --gold-light: #f4e5b0;
            
            /* Degradados */
            --gradient-primary: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-medium) 50%, var(--blue-light) 100%);
            --gradient-gold: linear-gradient(135deg, var(--gold-door) 0%, var(--gold-light) 100%);
            --gradient-card: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            
            /* Sombras profesionales */
            --shadow-soft: 0 10px 40px rgba(0, 61, 122, 0.12);
            --shadow-hover: 0 15px 50px rgba(0, 61, 122, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #e8f4f8 0%, #f0f7ff 50%, #e8f0f8 100%);
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Fondo decorativo sutil */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(75, 174, 232, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            z-index: 0;
        }

        .card-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }

        .card {
            background: var(--gradient-card);
            padding: 50px 35px;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-5px);
        }

        /* Línea decorativa superior con degradado */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-primary);
        }

        .logo-wrapper {
            position: relative;
            width: 130px;
            height: 130px;
            margin: 0 auto 30px;
            background: white;
            border-radius: 50%;
            padding: 15px;
            box-shadow: 0 8px 25px rgba(0, 61, 122, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrapper img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.1));
        }

        .name-section {
            margin-bottom: 35px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--blue-dark);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .title-badge {
            display: inline-block;
            background: var(--gradient-primary);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 119, 212, 0.3);
        }

        .divider {
            width: 60px;
            height: 3px;
            background: var(--gradient-gold);
            margin: 25px auto;
            border-radius: 2px;
        }

        /* Botones rediseñados - Estilo moderno */
        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 16px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .action-btn i {
            font-size: 1.3rem;
            transition: transform 0.3s ease;
        }

        .action-btn span {
            font-size: 0.75rem;
            opacity: 0.9;
        }

        /* Botón principal - Teléfono */
        .btn-call {
            background: var(--gradient-primary);
            color: white;
            grid-column: span 2;
            box-shadow: 0 6px 20px rgba(0, 119, 212, 0.35);
        }

        .btn-call:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 119, 212, 0.45);
        }

        .btn-call:hover i {
            transform: scale(1.1);
        }

        /* Botón WhatsApp */
        .btn-whatsapp {
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-whatsapp:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4);
        }

        /* Botón Guardar Contacto */
        .btn-save {
            background: white;
            color: var(--blue-dark);
            border: 2px solid var(--blue-medium);
            box-shadow: 0 4px 15px rgba(0, 119, 212, 0.1);
        }

        .btn-save:hover {
            background: var(--blue-dark);
            color: white;
            border-color: var(--blue-dark);
            transform: translateY(-2px);
        }

        /* Efecto de brillo en hover */
        .action-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .action-btn:hover::after {
            left: 100%;
        }

        .footer-section {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 61, 122, 0.1);
        }

        .tagline {
            font-family: 'Playfair Display', serif;
            font-size: 0.9rem;
            color: var(--blue-dark);
            font-style: italic;
            margin-bottom: 8px;
        }

        .company-info {
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            animation: fadeInUp 0.8s ease-out;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 40px 25px;
            }
            
            h1 {
                font-size: 1.7rem;
            }
            
            .actions-grid {
                grid-template-columns: 1fr;
            }
            
            .btn-call {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card">
            <div class="logo-wrapper">
                <img src="logo2.png" alt="Alba Núñez Real Estate Logo">
            </div>
            
            <div class="name-section">
                <h1>Alba Núñez</h1>
                <div class="title-badge">Real Estate Investor</div>
            </div>

            <div class="divider"></div>

            <div class="actions-grid">
                <a href="tel:+16614931733" class="action-btn btn-call">
                    <i class="fa-solid fa-phone"></i>
                    <span>Call Now</span>
                </a>
                
                <a href="https://wa.me/16614931733" class="action-btn btn-whatsapp">
                    <i class="fa-brands fa-whatsapp"></i>
                    <span>WhatsApp</span>
                </a>
                
                <button onclick="downloadVCard()" class="action-btn btn-save">
                    <i class="fa-solid fa-user-plus"></i>
                    <span>Save Contact</span>
                </button>
            </div>

            <div class="footer-section">
                <div class="tagline">"Transforming Properties into Profitable Investments"</div>
                <div class="company-info">Smart Investment Strategies</div>
            </div>
        </div>
    </div>

    <script>
        function downloadVCard() {
            const vcard = "BEGIN:VCARD\nVERSION:3.0\nFN:Alba Nunez\nORG:Real Estate Investments\nTITLE:Real Estate Investor\nTEL;TYPE=CELL:+16614931733\nEND:VCARD";
            const blob = new Blob([vcard], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'Alba_Nunez.vcf';
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
