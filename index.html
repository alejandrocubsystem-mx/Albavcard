<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"> <!-- CRUCIAL PARA LA Ñ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alba Nuñez | Real Estate Investor</title>
    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2d6a7d;
            --accent: #c0907d;
            --bg: #f4f7f6;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(45, 106, 125, 0.15);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo-img { 
            width: 100%;
            max-width: 280px; 
            height: auto;
            margin-bottom: 20px; 
            border-radius: 10px; /* Opcional: bordes suaves al logo */
        }

        .profile-info { margin-bottom: 30px; }
        
        .name { 
            font-size: 1.8rem; 
            color: var(--primary); 
            font-weight: 800; 
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .title { 
            font-size: 1.1rem; 
            color: var(--accent); 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 400;
        }

        .divider { 
            width: 50px; 
            height: 3px; 
            background: var(--accent); 
            margin: 15px auto; 
            border-radius: 2px;
        }

        .btn-save { 
            display: inline-block;
            padding: 15px 30px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 700;
            font-size: 0.9rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
            background: var(--accent); 
            color: #fff; 
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(192, 144, 125, 0.3);
            width: 100%;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(192, 144, 125, 0.4);
        }
        .btn-save span { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: 400; 
            opacity: 0.9; 
            margin-top: 4px; 
        }

        .social-row { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
        }
        
        .icon-btn { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 1px solid #e2e8f0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem;
            text-decoration: none; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
        }
        
        .fa-phone { color: var(--primary); }
        .fa-whatsapp { color: #25d366; }
        
        .icon-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Asegúrate de tener una imagen llamada logo.png o cambia el src aquí -->
        <img src="logo1.png" alt="Logo Alba Nuñez" class="logo-img">
        
        <div class="profile-info">
            <h1 class="name">Alba Nuñez</h1>
            <p class="title">Investor</p>
            <p class="subtitle">Real Estate Specialist</p>
            <div class="divider"></div>
        </div>

        <button onclick="downloadVCard()" class="btn-save">
            SAVE CONTACT
            <span>+1 (661) 493-1733</span>
        </button>

        <div class="social-row">
            <a href="tel:+16614931733" class="icon-btn" title="Llamar Ahora">
                <i class="fa-solid fa-phone"></i>
            </a>
            <a href="https://wa.me/16614931733" class="icon-btn" title="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>
    </div>

    <script>
        async function downloadVCard() {
            try {
                // 1. Cargar el archivo logo.txt
                const response = await fetch('logo.txt');
                if (!response.ok) throw new Error("No se pudo cargar logo.txt");
                
                let base64Logo = await response.text();
                
                // 2. Limpieza robusta: eliminar prefijos data URI, espacios, saltos de línea
                base64Logo = base64Logo.replace(/^data:image\/(png|jpeg|jpg);base64,/, '')
                                       .replace(/\s/g, '')
                                       .trim();

                if (!base64Logo) throw new Error("El archivo logo.txt está vacío o corrupto");

                // 3. Detectar tipo de imagen por los primeros caracteres
                // PNG empieza con iVBORw0KGgo
                // JPEG empieza con /9j/
                let imageType = 'JPEG'; // Default
                if (base64Logo.startsWith('iVBORw0KGgo')) {
                    imageType = 'PNG';
                } else if (base64Logo.startsWith('/9j/')) {
                    imageType = 'JPEG';
                } else {
                    console.warn("Formato de imagen no reconocido, asumiendo JPEG");
                }

                // 4. Construir vCard 3.0 con CHARSET=UTF-8 explícito para cada campo
                // Esto soluciona el problema de la "Ñ" que aparecía como "√±"
                const vcardContent = [
                    "BEGIN:VCARD",
                    "VERSION:3.0",
                    "PRODID:-//Alba Investment//NONSGML vCard//EN",
                    "FN;CHARSET=UTF-8:Alba Nuñez",       // Nombre completo
                    "N;CHARSET=UTF-8:Nuñez;Alba;;;",     // Apellido;Nombre;;;
                    "ORG;CHARSET=UTF-8:ALBA Investment", // Organización
                    "TITLE;CHARSET=UTF-8:Real Estate Investor", // Título
                    "TEL;TYPE=CELL,VOICE;TYPE=PREF:+16614931733", // Teléfono
                    "PHOTO;ENCODING=b;TYPE=" + imageType + ":" + base64Logo, // Foto
                    "END:VCARD"
                ].join("\r\n");

                // 5. Crear Blob con codificación UTF-8 explícita
                // Usamos TextEncoder para garantizar que los bytes sean UTF-8 correcto
                const encoder = new TextEncoder();
                const uint8Array = encoder.encode(vcardContent);
                const blob = new Blob([uint8Array], { type: "text/vcard;charset=utf-8" });
                
                // 6. Descargar el archivo
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "Alba_Nunez.vcf";
                document.body.appendChild(link); // Necesario para Firefox
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                
                console.log("✅ Contacto generado correctamente con foto y nombre correcto.");

            } catch (err) {
                console.error("❌ Error:", err);
                alert("Hubo un error al generar el contacto. Verifica que 'logo.txt' contenga una imagen Base64 válida.");
                
                // Fallback: Generar vCard sin foto pero con nombre correcto
                const vcardSimple = [
                    "BEGIN:VCARD",
                    "VERSION:3.0",
                    "FN;CHARSET=UTF-8:Alba Nuñez",
                    "N;CHARSET=UTF-8:Nuñez;Alba;;;",
                    "ORG;CHARSET=UTF-8:ALBA Investment",
                    "TITLE;CHARSET=UTF-8:Real Estate Investor",
                    "TEL;TYPE=CELL,VOICE;TYPE=PREF:+16614931733",
                    "END:VCARD"
                ].join("\r\n");
                
                const encoder = new TextEncoder();
                const blob = new Blob([encoder.encode(vcardSimple)], { type: "text/vcard;charset=utf-8" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "Alba_Nunez_SinFoto.vcf";
                link.click();
                URL.revokeObjectURL(url);
            }
        }
    </script>
</body>
</html>
