<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alba Nuñez | Real Estate Investor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2d6a7d;
            --accent: #c0907d;
            --bg: #f4f7f6;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(45, 106, 125, 0.15);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .logo-img { 
            width: 100%;
            max-width: 280px; 
            height: auto;
            margin-bottom: 20px; 
        }

        .profile-info { margin-bottom: 30px; }
        
        .name { 
            font-size: 1.8rem; 
            color: var(--primary); 
            font-weight: 800; 
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .title { 
            font-size: 1.1rem; 
            color: var(--accent); 
            font-weight: 600; 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 400;
        }

        .divider { 
            width: 50px; 
            height: 3px; 
            background: var(--accent); 
            margin: 15px auto; 
            border-radius: 2px;
        }

        .btn-save { 
            display: inline-block;
            padding: 12px 30px; 
            border-radius: 12px; 
            border: none; 
            font-weight: 700;
            font-size: 0.8rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s;
            background: var(--accent); 
            color: #fff; 
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(192, 144, 125, 0.3);
        }
        .btn-save span { display: block; font-size: 0.7rem; font-weight: 400; opacity: 0.9; margin-top: 2px; }

        .social-row { 
            display: flex; 
            justify-content: center; 
            gap: 25px; 
        }
        
        .icon-btn { 
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            border: 1px solid #e2e8f0;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.5rem;
            text-decoration: none; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
        }
        
        .fa-phone { color: var(--primary); }
        .fa-whatsapp { color: #25d366; }
        
        .icon-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo1.png" alt="ALBA Nuñez" class="logo-img">
        
        <div class="profile-info">
            <h1 class="name">Alba Nuñez</h1>
            <p class="title">Investor</p>
            <p class="subtitle">Real Estate Specialist</p>
            <div class="divider"></div>
        </div>

        <button onclick="downloadVCard()" class="btn-save">
            SAVE CONTACT
            <span>+1 (661) 493-1733</span>
        </button>

        <div class="social-row">
            <a href="tel:+16614931733" class="icon-btn" title="Call Now">
                <i class="fa-solid fa-phone"></i>
            </a>
            <a href="https://wa.me/16614931733" class="icon-btn" title="WhatsApp">
                <i class="fa-brands fa-whatsapp"></i>
            </a>
        </div>
    </div>

    <script>
        async function downloadVCard() {
            try {
                const response = await fetch('logo.txt');
                let base64Logo = await response.text();
                
                // Limpieza absoluta de cualquier caracter o salto que rompa iOS
                base64Logo = base64Logo.replace(/^data:image\/(png|jpeg|jpg);base64,/, '').replace(/\s/g, '');
                
                // Estructura compatible con vCard 3.0 estándar de Apple
                const vcardLines = [
                    "BEGIN:VCARD",
                    "VERSION:3.0",
                    "FN:Alba Nuñez",
                    "N:Nuñez;Alba;;;",
                    "ORG:ALBA Investment",
                    "TITLE:Real Estate Investor",
                    "TEL;TYPE=CELL;TYPE=PREF:+16614931733",
                    "PHOTO;TYPE=PNG;ENCODING=b:" + base64Logo,
                    "END:VCARD"
                ];

                const vcardContent = vcardLines.join("\r\n");

                // En lugar de un Blob binario, usamos Data URL con base64 para engañar al WebKit de iOS
                const link = document.createElement('a');
                link.href = 'data:text/vcard;charset=utf-8;base64,' + btoa(unescape(encodeURIComponent(vcardContent)));
                link.download = "Alba_Nunez.vcf";
                link.click();
            } catch (err) {
                // Fallback simplificado si la carga del archivo de imagen falla
                const vcardSimple = [
                    "BEGIN:VCARD",
                    "VERSION:3.0",
                    "FN:Alba Nuñez",
                    "N:Nuñez;Alba;;;",
                    "ORG:ALBA Investment",
                    "TITLE:Real Estate Investor",
                    "TEL;TYPE=CELL;TYPE=PREF:+16614931733",
                    "END:VCARD"
                ].join("\r\n");
                
                const link = document.createElement('a');
                link.href = 'data:text/vcard;charset=utf-8;base64,' + btoa(unescape(encodeURIComponent(vcardSimple)));
                link.download = "Alba_Nunez.vcf";
                link.click();
            }
        }
    </script>
</body>
</html>
