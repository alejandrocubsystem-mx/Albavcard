<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALBA Investment | Professional Profile</title>
    <style>
        :root {
            --primary: #2d6a7d;
            --accent: #c0907d;
            --bg: #f4f7f6;
            --text-main: #1e293b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 30px 60px -12px rgba(45, 106, 125, 0.1);
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .logo-img { max-width: 180px; margin-bottom: 25px; }
        h1 { color: var(--primary); font-size: 1.4rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .divider { width: 40px; height: 3px; background: var(--accent); margin: 15px auto 30px; }

        /* Botones */
        .actions { display: flex; flex-direction: column; gap: 12px; margin-bottom: 35px; }
        .btn {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700;
            font-size: 0.85rem; cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        .btn-save { background: var(--accent); color: #fff; } /* Color Oro Rosa */
        .btn-call { background: var(--primary); color: #fff; }
        .btn span { display: block; font-size: 0.7rem; font-weight: 400; opacity: 0.9; margin-top: 2px; }

        /* Sección de Servicios */
        .services-title { 
            font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; 
            letter-spacing: 2px; margin-bottom: 15px; font-weight: 700; 
        }
        .services-container { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .service-card {
            padding: 14px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            color: var(--primary);
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="logo1.png" alt="ALBA Investment" class="logo-img">
        <h1>ALBA Investment</h1>
        <div class="divider"></div>

        <div class="actions">
            <button onclick="downloadVCard()" class="btn btn-save">
                SAVE CONTACT
                <span>+1 (661) 493-1733</span>
            </button>
            <a href="tel:+16614931733" class="btn btn-call">CALL NOW</a>
        </div>

        <div class="services-title">Services</div>
        <div class="services-container">
            <div class="service-card">Real Estate Investment</div>
            <div class="service-card">Fix and Flip</div>
            <div class="service-card">Buy and Hold</div>
        </div>
    </div>

    <script>
        async function downloadVCard() {
            try {
                const response = await fetch('logo.txt');
                const base64Logo = await response.text();
                
                const vcardContent = [
                    "BEGIN:VCARD",
                    "VERSION:3.0",
                    "FN:ALBA Investment",
                    "ORG:ALBA Investment",
                    "TEL;TYPE=CELL:+16614931733",
                    "NOTE:Investment services: Real Estate, Fix and Flip, Buy and Hold.",
                    "PHOTO;ENCODING=b;TYPE=PNG:" + base64Logo.trim(),
                    "END:VCARD"
                ].join("\n");

                const blob = new Blob([vcardContent], { type: "text/vcard" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = "ALBA_Investment.vcf";
                link.click();
                URL.revokeObjectURL(url);
            } catch (err) {
                alert("Ensure 'logo.txt' is available in the server.");
            }
        }
    </script>
</body>
</html>
